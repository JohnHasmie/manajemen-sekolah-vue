appId: com.example.manajemensekolah
---
# ============================================================
# RUN ALL E2E TESTS
# Single login, tests all screens sequentially.
# Efficient: ~2-3 minutes total instead of re-logging in per test.
# ============================================================

# ── Login once ──
- runFlow: login.yaml

# ── Test 1: Dashboard loads correctly ──
- takeScreenshot: screenshots/01_dashboard_loaded

# ── Test 2: Navigate admin screens (scroll + tap each) ──

# Student Management
- tapOn: "Kelola Siswa"
- extendedWaitUntil:
    visible: ".*"
    timeout: 10000
- takeScreenshot: screenshots/02_students
- back

# Teacher Management
- tapOn: "Kelola Guru"
- extendedWaitUntil:
    visible: ".*"
    timeout: 10000
- takeScreenshot: screenshots/03_teachers
- back

# Class Management
- tapOn: "Kelola Kelas"
- extendedWaitUntil:
    visible: ".*"
    timeout: 10000
- takeScreenshot: screenshots/04_classes
- back

# Subject Management
- tapOn: "Kelola Mapel"
- extendedWaitUntil:
    visible: ".*"
    timeout: 10000
- takeScreenshot: screenshots/05_subjects
- back

# Schedule Management
- tapOn: "Jadwal Mengajar"
- extendedWaitUntil:
    visible: ".*"
    timeout: 10000
- takeScreenshot: screenshots/06_schedule
- back

# Finance
- tapOn: "Keuangan"
- extendedWaitUntil:
    visible: ".*"
    timeout: 10000
- takeScreenshot: screenshots/07_finance
- back

# Announcements
- tapOn: "Pengumuman"
- extendedWaitUntil:
    visible: ".*"
    timeout: 10000
- takeScreenshot: screenshots/08_announcements
- back

# Scroll down for more menus
- scroll:
    direction: DOWN

# Attendance Report
- runFlow:
    when:
      visible: "Laporan Absensi"
    commands:
      - tapOn: "Laporan Absensi"
      - extendedWaitUntil:
          visible: ".*"
          timeout: 10000
      - takeScreenshot: screenshots/09_attendance
      - back

# Lesson Plans
- runFlow:
    when:
      visible: "RPP"
    commands:
      - tapOn: "RPP"
      - extendedWaitUntil:
          visible: ".*"
          timeout: 10000
      - takeScreenshot: screenshots/10_lesson_plans
      - back

# Report Cards
- runFlow:
    when:
      visible: "Raport"
    commands:
      - tapOn: "Raport"
      - extendedWaitUntil:
          visible: ".*"
          timeout: 10000
      - takeScreenshot: screenshots/11_report_cards
      - back

# Settings
- runFlow:
    when:
      visible: "Pengaturan"
    commands:
      - tapOn: "Pengaturan"
      - extendedWaitUntil:
          visible: ".*"
          timeout: 10000
      - takeScreenshot: screenshots/12_settings
      - back

# ── Test 3: Final screenshot ──
- scroll:
    direction: UP
- takeScreenshot: screenshots/13_final_dashboard

# ============================================================
# All screens verified. Total: ~2-3 minutes.
# Screenshots saved in maestro/screenshots/ for visual review.
# ============================================================
