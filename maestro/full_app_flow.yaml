      visible: "Raport"
    commands:
      - tapOn: "Raport"
      - extendedWaitUntil:
          visible: ".*"
          timeout: 10000
      - takeScreenshot: screenshots/10_report_cards
      - back

# ── Step 5: Settings ──
- runFlow:
    when:
      visible: "Pengaturan"
    commands:
      - tapOn: "Pengaturan"
      - extendedWaitUntil:
          visible: ".*"
          timeout: 10000
      - takeScreenshot: screenshots/11_settings
      - back

# ── Step 6: Logout ──
# Open profile/account section
- scroll:
    direction: UP

- takeScreenshot: screenshots/12_before_logout
