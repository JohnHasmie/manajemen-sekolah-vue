# Announcements
- runFlow:
    when:
      visible: "Pengumuman"
    commands:
      - tapOn: "Pengumuman"
      - extendedWaitUntil:
          visible: ".*"
          timeout: 10000
      - takeScreenshot: screenshots/08_announcements
      - back

# ── Step 4: Scroll down for more menu items ──
- scroll:
    direction: DOWN

# Attendance Report
- runFlow:
    when:
      visible: "Laporan Absensi"
    commands:
      - tapOn: "Laporan Absensi"
      - extendedWaitUntil:
          visible: ".*"
          timeout: 10000
      - takeScreenshot: screenshots/09_attendance_report
      - back

# Report Cards
