appId: com.example.manajemensekolah
---
# ============================================================
# FULL APP FLOW E2E TEST
# Tests all critical paths in a single efficient run.
# No re-login between tests — stays on dashboard and navigates.
# ============================================================

# ── Step 1: Login ──
- runFlow: login.yaml

# ── Step 2: Verify Dashboard Loaded ──
- assertVisible:
    text: ".*"  # Dashboard has content
- takeScreenshot: screenshots/01_dashboard

# ── Step 3: Navigate to each admin menu item ──

# Student Management
- runFlow:
    when:
      visible: "Kelola Siswa"
    commands:
      - tapOn: "Kelola Siswa"
      - extendedWaitUntil:
          visible: ".*"
          timeout: 10000
      - takeScreenshot: screenshots/02_student_management
      - back

# Teacher Management
- runFlow:
    when:
      visible: "Kelola Guru"
    commands:
      - tapOn: "Kelola Guru"
      - extendedWaitUntil:
          visible: ".*"
          timeout: 10000
      - takeScreenshot: screenshots/03_teacher_management
      - back

# Class Management
- runFlow:
    when:
      visible: "Kelola Kelas"
    commands:
      - tapOn: "Kelola Kelas"
      - extendedWaitUntil:
          visible: ".*"
          timeout: 10000
      - takeScreenshot: screenshots/04_class_management
      - back

# Subject Management
- runFlow:
    when:
      visible: "Kelola Mapel"
    commands:
      - tapOn: "Kelola Mapel"
      - extendedWaitUntil:
          visible: ".*"
          timeout: 10000
