appId: com.example.manajemensekolah
---
# Reusable login flow — called by other tests via runFlow
- launchApp:
    clearState: true

# Wait for app to initialize and show login
- extendedWaitUntil:
    visible: "Email"
    timeout: 15000

# Enter credentials (production demo account)
- tapOn: "Email"
- inputText: "admindemo@demo-kamiledu.com"
- tapOn: "Password"
- inputText: "password123"
- hideKeyboard
- tapOn: "LOGIN"

# Handle school selection if shown
- runFlow:
    when:
      visible: "Pilih Sekolah"
    commands:
      - tapOn:
          index: 0

# Handle role selection if shown
- runFlow:
    when:
      visible: "Akses sebagai"
    commands:
      - tapOn: "Admin"

# Wait for dashboard — verify user name appears
- extendedWaitUntil:
    visible: "Admin"
    timeout: 20000
