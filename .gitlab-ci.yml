# GitLab CI/CD for KamilEdu Flutter App
#
# Pipeline flow:
#   Every push to any branch:  analyze → test
#   On main branch:            detect_changes (recommends release vs patch)
#
# Manual deploy buttons (main branch only):
#   release     →  Shorebird release + Play Store upload (for new versions)
#   patch       →  OTA patch to latest release (for Dart-only hotfixes)
#
# IMPORTANT: Always use "release" for new versions. The "patch" button
# only works if users have a Shorebird-enabled build installed.
#
# Required CI/CD Variables:
#   API_BASE_URL           - API endpoint URL
#   KEYSTORE_BASE64        - base64-encoded .jks keystore
#   KEY_ALIAS, KEY_PASSWORD, STORE_PASSWORD
#   PLAY_STORE_JSON_BASE64 - base64-encoded Google Play service account JSON
#   SHOREBIRD_TOKEN        - Shorebird API key (console.shorebird.dev)

stages:
  - analyze
  - test
  - detect
  - deploy

variables:
  FLUTTER_VERSION: "3.35.4"
  LC_ALL: "en_US.UTF-8"
  LANG: "en_US.UTF-8"
  GIT_STRATEGY: fetch

# ---------------------------------------------------------------------------
# Reusable templates
# ---------------------------------------------------------------------------
.flutter_setup: &flutter_setup
  before_script:
    - export PATH="$HOME/MobileProjects/flutter/bin:$HOME/.pub-cache/bin:$PATH"
    - echo "API_BASE_URL=${API_BASE_URL}" > .env
    - flutter pub get
    - |
      REGISTRANT="android/app/src/main/java/io/flutter/plugins/GeneratedPluginRegistrant.java"
      if [ -f "$REGISTRANT" ]; then
        sed -i.bak '/integration_test/d' "$REGISTRANT" && rm -f "${REGISTRANT}.bak"
      fi

.shorebird_setup: &shorebird_setup
  before_script:
    - export PATH="$HOME/MobileProjects/flutter/bin:$HOME/.pub-cache/bin:$HOME/.shorebird/bin:$PATH"
    - |
      if ! command -v shorebird &>/dev/null; then
        curl --proto '=https' --tlsv1.2 https://raw.githubusercontent.com/shorebirdtech/install/main/install.sh | bash
        export PATH="$HOME/.shorebird/bin:$PATH"
      fi
    - echo "API_BASE_URL=${API_BASE_URL}" > .env
    - flutter pub get
    - |
      REGISTRANT="android/app/src/main/java/io/flutter/plugins/GeneratedPluginRegistrant.java"
      if [ -f "$REGISTRANT" ]; then
        sed -i.bak '/integration_test/d' "$REGISTRANT" && rm -f "${REGISTRANT}.bak"
      fi
    - echo "${KEYSTORE_BASE64}" | base64 -d > android/app/upload-keystore.jks
    - |
      cat > android/key.properties << EOF
      storePassword=${STORE_PASSWORD}
      keyPassword=${KEY_PASSWORD}
      keyAlias=${KEY_ALIAS}
      storeFile=upload-keystore.jks
      EOF

# ---------------------------------------------------------------------------
# Stage 1: Analyze
# ---------------------------------------------------------------------------
analyze:
  <<: *flutter_setup
  stage: analyze
  script:
    - flutter analyze --fatal-warnings
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

# ---------------------------------------------------------------------------
# Stage 2: Test
# ---------------------------------------------------------------------------
test:
  <<: *flutter_setup
  stage: test
  script:
    - flutter test --reporter=expanded
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
    - if: $CI_COMMIT_BRANCH

# ---------------------------------------------------------------------------
# Stage 3: Detect changes (patch vs release recommendation)
# ---------------------------------------------------------------------------
detect_changes:
  stage: detect
  script:
    - |
      NATIVE_PATTERNS="android/ ios/ macos/ linux/ windows/ web/ pubspec.yaml pubspec.lock shorebird.yaml"
    - |
      if [ "$CI_COMMIT_BEFORE_SHA" != "" ] && [ "$CI_COMMIT_BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
        BASE_SHA="$CI_COMMIT_BEFORE_SHA"
      else
        BASE_SHA="HEAD~1"
      fi
    - |
      CHANGED_FILES=$(git diff --name-only "$BASE_SHA" "$CI_COMMIT_SHA" 2>/dev/null || git diff --name-only HEAD~1 HEAD)
      echo "$CHANGED_FILES"
    - |
      NEEDS_RELEASE=false
      for pattern in $NATIVE_PATTERNS; do
        if echo "$CHANGED_FILES" | grep -q "^${pattern}"; then
          NEEDS_RELEASE=true
        fi
      done
    - |
      echo ""
      echo "Pipeline IID: ${CI_PIPELINE_IID}"
      echo ""
      if [ "$NEEDS_RELEASE" = "true" ]; then
        echo "🚀 RELEASE needed — native/plugin changes detected"
        echo "   → Click: release (builds + uploads to Play Store)"
      else
        echo "⚡ PATCH OK — Dart-only changes"
        echo "   → Click: patch (instant OTA to existing users)"
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ---------------------------------------------------------------------------
# Release (manual) — Shorebird release + Play Store upload in one job
#
# This is the ONLY way to publish a new version. It:
# 1. Creates a Shorebird-enabled release build (with OTA engine)
# 2. Uploads the AAB to Google Play Store (alpha track)
#
# Users who install this version can receive future OTA patches.
# ---------------------------------------------------------------------------
release:
  <<: *shorebird_setup
  stage: deploy
  script:
    - export PATH="$HOME/.shorebird/bin:$PATH"
    # 1. Build version string
    - |
      VERSION_NAME=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
      BUILD_NUMBER=${CI_PIPELINE_IID}
      echo "═══════════════════════════════════════════"
      echo "  Release: ${VERSION_NAME}+${BUILD_NUMBER}"
      echo "═══════════════════════════════════════════"
    # 2. Shorebird release (builds AAB with OTA engine)
    - shorebird release android --flutter-version=${FLUTTER_VERSION} --build-name=${VERSION_NAME} --build-number=${BUILD_NUMBER} --dart-define=API_BASE_URL=${API_BASE_URL} -- --no-pub --no-tree-shake-icons
    # 3. Upload to Play Store
    - command -v fastlane &>/dev/null || gem install fastlane --no-document
    - echo "${PLAY_STORE_JSON_BASE64}" | base64 -d > play-store-key.json
    - |
      fastlane supply \
        --aab build/app/outputs/bundle/release/app-release.aab \
        --json_key play-store-key.json \
        --package_name com.kamillabs.kamiledu \
        --track alpha \
        --skip_upload_metadata \
        --skip_upload_images \
        --skip_upload_screenshots
    - rm -f play-store-key.json
    - |
      echo ""
      echo "✅ Released ${VERSION_NAME}+${BUILD_NUMBER}"
      echo "   Shorebird: registered for OTA patches"
      echo "   Play Store: uploaded to alpha track"
  artifacts:
    paths:
      - build/app/outputs/bundle/release/app-release.aab
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
      allow_failure: false

# ---------------------------------------------------------------------------
# Patch (manual) — OTA update to latest release
#
# Pushes a Dart-only patch to all users who have the latest Shorebird
# release installed. No Play Store review needed — applies on next
# app restart.
#
# Only works if the latest release was created with the "release" job
# above (which includes the Shorebird engine).
# ---------------------------------------------------------------------------
patch:
  <<: *shorebird_setup
  stage: deploy
  script:
    - export PATH="$HOME/.shorebird/bin:$PATH"
    - |
      echo "═══════════════════════════════════════════"
      echo "  Patching latest release..."
      echo "═══════════════════════════════════════════"
    - shorebird patch android --release-version=latest --allow-asset-diffs --dart-define=API_BASE_URL=${API_BASE_URL} -- --no-pub
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
      allow_failure: false
