# GitLab CI/CD for KamilEdu Flutter App
#
# Pipeline flow:
#   Every push to any branch:  analyze → test
#   On main branch:            detect → auto-patch (if Dart-only) or manual release
#
# Auto-patch (Dart-only changes on main):
#   Automatically pushes OTA update via Shorebird to all users with the
#   latest release installed. No Play Store review needed.
#
# Manual release (native/plugin changes on main):
#   Click "release" button to create a new Shorebird release + upload
#   to Play Store. Required when native code, plugins, or assets change.
#
# Required CI/CD Variables:
#   API_BASE_URL           - API endpoint URL
#   KEYSTORE_BASE64        - base64-encoded .jks keystore
#   KEY_ALIAS, KEY_PASSWORD, STORE_PASSWORD
#   PLAY_STORE_JSON_BASE64 - base64-encoded Google Play service account JSON
#   SHOREBIRD_TOKEN        - Shorebird API key (console.shorebird.dev)

stages:
  - analyze
  - test
  - detect
  - deploy

variables:
  FLUTTER_VERSION: "3.41.6"
  LC_ALL: "en_US.UTF-8"
  LANG: "en_US.UTF-8"
  GIT_STRATEGY: fetch

# ---------------------------------------------------------------------------
# Reusable templates
# ---------------------------------------------------------------------------
.flutter_setup: &flutter_setup
  before_script:
    - export PATH="$HOME/MobileProjects/flutter/bin:$HOME/.pub-cache/bin:$PATH"
    # Clear stale git locks and upgrade Flutter (bumps bundled Dart SDK)
    - rm -f "$HOME/MobileProjects/flutter/.git/index.lock"
    - flutter upgrade --force || true
    - flutter precache || true
    - flutter --version
    - echo "API_BASE_URL=${API_BASE_URL}" > .env
    - flutter pub get
    - |
      REGISTRANT="android/app/src/main/java/io/flutter/plugins/GeneratedPluginRegistrant.java"
      if [ -f "$REGISTRANT" ]; then
        sed -i.bak '/integration_test/d' "$REGISTRANT" && rm -f "${REGISTRANT}.bak"
      fi

.shorebird_setup: &shorebird_setup
  before_script:
    - export PATH="$HOME/MobileProjects/flutter/bin:$HOME/.pub-cache/bin:$HOME/.shorebird/bin:$PATH"
    # Clear stale git locks and upgrade Flutter
    - rm -f "$HOME/MobileProjects/flutter/.git/index.lock"
    - flutter upgrade --force || true
    - flutter precache || true
    - flutter --version
    - |
      if ! command -v shorebird &>/dev/null; then
        curl --proto '=https' --tlsv1.2 https://raw.githubusercontent.com/shorebirdtech/install/main/install.sh | bash
        export PATH="$HOME/.shorebird/bin:$PATH"
      fi
    - shorebird upgrade || true
    - echo "API_BASE_URL=${API_BASE_URL}" > .env
    - flutter pub get
    - |
      REGISTRANT="android/app/src/main/java/io/flutter/plugins/GeneratedPluginRegistrant.java"
      if [ -f "$REGISTRANT" ]; then
        sed -i.bak '/integration_test/d' "$REGISTRANT" && rm -f "${REGISTRANT}.bak"
      fi
    - echo "${KEYSTORE_BASE64}" | base64 -d > android/app/upload-keystore.jks
    - |
      cat > android/key.properties << EOF
      storePassword=${STORE_PASSWORD}
      keyPassword=${KEY_PASSWORD}
      keyAlias=${KEY_ALIAS}
      storeFile=upload-keystore.jks
      EOF

# ---------------------------------------------------------------------------
# Stage 1: Analyze
# ---------------------------------------------------------------------------
analyze:
  <<: *flutter_setup
  stage: analyze
  script:
    - flutter analyze --fatal-warnings --no-fatal-infos
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

# ---------------------------------------------------------------------------
# Stage 2: Test
# ---------------------------------------------------------------------------
test:
  <<: *flutter_setup
  stage: test
  script:
    - flutter test --reporter=expanded
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
    - if: $CI_COMMIT_BRANCH

# ---------------------------------------------------------------------------
# Stage 3: Detect changes → sets NEEDS_RELEASE variable for deploy stage
# ---------------------------------------------------------------------------
detect_changes:
  stage: detect
  script:
    - |
      NATIVE_PATTERNS="android/ ios/ macos/ linux/ windows/ web/ pubspec.yaml pubspec.lock shorebird.yaml"
    - |
      if [ "$CI_COMMIT_BEFORE_SHA" != "" ] && [ "$CI_COMMIT_BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
        BASE_SHA="$CI_COMMIT_BEFORE_SHA"
      else
        BASE_SHA="HEAD~1"
      fi
    - |
      CHANGED_FILES=$(git diff --name-only "$BASE_SHA" "$CI_COMMIT_SHA" 2>/dev/null || git diff --name-only HEAD~1 HEAD)
      echo "Changed files:"
      echo "$CHANGED_FILES"
    - |
      NEEDS_RELEASE=false
      for pattern in $NATIVE_PATTERNS; do
        if echo "$CHANGED_FILES" | grep -q "^${pattern}"; then
          NEEDS_RELEASE=true
        fi
      done
    - |
      echo ""
      echo "Pipeline IID: ${CI_PIPELINE_IID}"
      echo "NEEDS_RELEASE: ${NEEDS_RELEASE}"
      echo ""
      # Write to dotenv artifact so downstream jobs can read the variable
      echo "NEEDS_RELEASE=${NEEDS_RELEASE}" > deploy.env
    - |
      if [ "$NEEDS_RELEASE" = "true" ]; then
        echo "🚀 RELEASE needed — native/plugin changes detected"
        echo "   → Click: release (builds + uploads to Play Store)"
      else
        echo "⚡ AUTO-PATCH — Dart-only changes detected"
        echo "   → Patch will run automatically"
      fi
  artifacts:
    reports:
      dotenv: deploy.env
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ---------------------------------------------------------------------------
# Release (manual) — Shorebird release + Play Store upload
#
# Creates a new Shorebird-enabled build with OTA engine and uploads
# to Google Play Store (alpha track). Required when native code changes.
# ---------------------------------------------------------------------------
release:
  <<: *shorebird_setup
  stage: deploy
  needs: ["detect_changes"]
  script:
    - export PATH="$HOME/.shorebird/bin:$PATH"
    - |
      VERSION_NAME=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
      BUILD_NUMBER=${CI_PIPELINE_IID}
      echo "═══════════════════════════════════════════"
      echo "  Release: ${VERSION_NAME}+${BUILD_NUMBER}"
      echo "═══════════════════════════════════════════"
    - shorebird release android --flutter-version=${FLUTTER_VERSION} --build-name=${VERSION_NAME} --build-number=${BUILD_NUMBER} --dart-define=API_BASE_URL=${API_BASE_URL} -- --no-pub --no-tree-shake-icons
    - command -v fastlane &>/dev/null || gem install fastlane --no-document
    - echo "${PLAY_STORE_JSON_BASE64}" | base64 -d > play-store-key.json
    - |
      fastlane supply \
        --aab build/app/outputs/bundle/release/app-release.aab \
        --json_key play-store-key.json \
        --package_name com.kamillabs.kamiledu \
        --track alpha \
        --skip_upload_metadata \
        --skip_upload_images \
        --skip_upload_screenshots
    - rm -f play-store-key.json
    - |
      echo ""
      echo "✅ Released ${VERSION_NAME}+${BUILD_NUMBER}"
      echo "   Shorebird: registered for OTA patches"
      echo "   Play Store: uploaded to alpha track"
  artifacts:
    paths:
      - build/app/outputs/bundle/release/app-release.aab
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
      allow_failure: false

# ---------------------------------------------------------------------------
# Patch (automatic) — OTA update to latest release
#
# Runs automatically on main when only Dart/asset changes are detected.
# Pushes an instant OTA patch via Shorebird — no Play Store review needed.
# Users get the update on next app restart.
#
# Can also be triggered manually (e.g. after a release, or to force-patch).
# Set SKIP_AUTO_PATCH=true in CI variables to disable auto-patching.
# ---------------------------------------------------------------------------
patch:
  <<: *shorebird_setup
  stage: deploy
  needs: ["detect_changes"]
  script:
    - export PATH="$HOME/.shorebird/bin:$PATH"
    - |
      echo "═══════════════════════════════════════════"
      echo "  Patching latest release (OTA)..."
      echo "  NEEDS_RELEASE: ${NEEDS_RELEASE:-unknown}"
      echo "═══════════════════════════════════════════"
    - shorebird patch android --release-version=latest --allow-asset-diffs --dart-define=API_BASE_URL=${API_BASE_URL} -- --no-pub
    - |
      echo ""
      echo "✅ Patch pushed — users will receive it on next app restart"
  rules:
    # Auto-patch: runs automatically when Dart-only changes on main
    # (NEEDS_RELEASE=false from detect_changes job)
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $NEEDS_RELEASE == "false" && $SKIP_AUTO_PATCH != "true"
      when: on_success
    # Manual fallback: always available as a manual button on main
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
      allow_failure: true
