# GitLab CI/CD for KamilEdu Flutter App
# Stages: analyze → test → detect → build → deploy → patch
#
# The "detect_changes" job automatically checks what changed and tells you
# whether to use shorebird_release (new version) or shorebird_patch (OTA).
#
# Required CI/CD Variables (Settings → CI/CD → Variables):
#   API_BASE_URL           - API endpoint URL
#   KEYSTORE_BASE64        - base64-encoded .jks keystore file
#   KEY_ALIAS              - keystore key alias
#   KEY_PASSWORD           - key password
#   STORE_PASSWORD         - keystore password
#   PLAY_STORE_JSON_BASE64 - base64-encoded Google Play service account JSON
#   SHOREBIRD_TOKEN        - Shorebird API key (from console.shorebird.dev)

stages:
  - analyze
  - test
  - detect
  - build
  - deploy
  - patch

variables:
  FLUTTER_VERSION: "3.35.4"

# ---------------------------------------------------------------------------
# Reusable templates
# ---------------------------------------------------------------------------
.flutter_setup: &flutter_setup
  before_script:
    - export PATH="$HOME/MobileProjects/flutter/bin:$HOME/.pub-cache/bin:$PATH"
    - echo "API_BASE_URL=${API_BASE_URL}" > .env
    - flutter pub get

.shorebird_setup: &shorebird_setup
  before_script:
    - export PATH="$HOME/MobileProjects/flutter/bin:$HOME/.pub-cache/bin:$HOME/.shorebird/bin:$PATH"
    - |
      if ! command -v shorebird &>/dev/null; then
        curl --proto '=https' --tlsv1.2 https://raw.githubusercontent.com/shorebirdtech/install/main/install.sh | bash
      fi
    - echo "API_BASE_URL=${API_BASE_URL}" > .env
    - flutter pub get
    - echo "${KEYSTORE_BASE64}" | base64 -d > android/app/upload-keystore.jks
    - |
      cat > android/key.properties << EOF
      storePassword=${STORE_PASSWORD}
      keyPassword=${KEY_PASSWORD}
      keyAlias=${KEY_ALIAS}
      storeFile=upload-keystore.jks
      EOF

# ---------------------------------------------------------------------------
# Stage 1: Analyze
# ---------------------------------------------------------------------------
analyze:
  <<: *flutter_setup
  stage: analyze
  script:
    - flutter analyze --fatal-warnings
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

# ---------------------------------------------------------------------------
# Stage 2: Test
# On MR: runs as manual (click ▶ to run, or merge without running).
# On branch push: runs automatically.
# GitLab merge check: pipeline passes when analyze ✅ + test ✅ or skipped.
# ---------------------------------------------------------------------------
test:
  <<: *flutter_setup
  stage: test
  script:
    - flutter test --reporter=expanded
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
    - if: $CI_COMMIT_BRANCH

# ---------------------------------------------------------------------------
# Stage 3: Detect change type (patch vs release)
#
# Compares changed files against the last merge into main.
# Native changes → NEEDS_RELEASE    (shorebird release + Play Store)
# Dart-only      → PATCH_OK         (shorebird patch, instant OTA)
#
# Result is printed in the job log AND saved as a dotenv artifact
# so downstream jobs can read DEPLOY_TYPE.
# ---------------------------------------------------------------------------
detect_changes:
  stage: detect
  script:
    - echo "Detecting changes..."

    # Files that require a full release (native code, plugins, config)
    # If ANY of these changed → must do shorebird release + Play Store upload
    - |
      NATIVE_PATTERNS="
        android/
        ios/
        macos/
        linux/
        windows/
        web/
        pubspec.yaml
        pubspec.lock
        shorebird.yaml
      "

    - |
      echo "Checking changes since last commit on main..."
      if [ "$CI_MERGE_REQUEST_DIFF_BASE_SHA" != "" ]; then
        BASE_SHA="$CI_MERGE_REQUEST_DIFF_BASE_SHA"
      elif [ "$CI_COMMIT_BEFORE_SHA" != "" ] && [ "$CI_COMMIT_BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
        BASE_SHA="$CI_COMMIT_BEFORE_SHA"
      else
        BASE_SHA="HEAD~1"
      fi
      echo "Base: $BASE_SHA"
      echo "Head: $CI_COMMIT_SHA"

    - |
      CHANGED_FILES=$(git diff --name-only "$BASE_SHA" "$CI_COMMIT_SHA" 2>/dev/null || git diff --name-only HEAD~1 HEAD)
      echo ""
      echo "===== Changed files ====="
      echo "$CHANGED_FILES"
      echo "========================="
      echo ""

    - |
      NEEDS_RELEASE=false
      RELEASE_REASONS=""
      for pattern in $NATIVE_PATTERNS; do
        pattern_clean=$(echo "$pattern" | tr -d ' ')
        if echo "$CHANGED_FILES" | grep -q "^${pattern_clean}"; then
          NEEDS_RELEASE=true
          MATCHED=$(echo "$CHANGED_FILES" | grep "^${pattern_clean}" | head -3)
          RELEASE_REASONS="${RELEASE_REASONS}\n  - ${pattern_clean}* → ${MATCHED}"
        fi
      done

    - |
      echo ""
      echo "╔══════════════════════════════════════════════════╗"
      if [ "$NEEDS_RELEASE" = "true" ]; then
        echo "║  🚀 RELEASE REQUIRED (native/plugin changes)    ║"
        echo "╠══════════════════════════════════════════════════╣"
        echo "║  Use: shorebird_release → deploy_playstore       ║"
        echo "╠══════════════════════════════════════════════════╣"
        echo -e "║  Reason:${RELEASE_REASONS}"
        DEPLOY_TYPE="release"
      else
        echo "║  ⚡ PATCH OK (Dart-only changes)                 ║"
        echo "╠══════════════════════════════════════════════════╣"
        echo "║  Use: shorebird_patch (instant OTA, no review)   ║"
        DEPLOY_TYPE="patch"
      fi
      echo "╚══════════════════════════════════════════════════╝"
      echo ""

    # Save result as dotenv artifact for downstream jobs
    - echo "DEPLOY_TYPE=${DEPLOY_TYPE}" > deploy.env
    - cat deploy.env

  artifacts:
    reports:
      dotenv: deploy.env
    expire_in: 1 day
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ---------------------------------------------------------------------------
# Stage 4: Build release AAB
# ---------------------------------------------------------------------------
build_android:
  <<: *flutter_setup
  stage: build
  needs:
    - job: analyze
      optional: true
    - job: test
      optional: true
    - detect_changes
  script:
    - echo "${KEYSTORE_BASE64}" | base64 -d > android/app/upload-keystore.jks
    - |
      cat > android/key.properties << EOF
      storePassword=${STORE_PASSWORD}
      keyPassword=${KEY_PASSWORD}
      keyAlias=${KEY_ALIAS}
      storeFile=upload-keystore.jks
      EOF
    - flutter build appbundle --release --dart-define=API_BASE_URL=${API_BASE_URL}
  artifacts:
    paths:
      - build/app/outputs/bundle/release/app-release.aab
    expire_in: 7 days
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ---------------------------------------------------------------------------
# Stage 5a: Deploy to Play Store
# Auto-shown when detect_changes says "release", otherwise manual
# ---------------------------------------------------------------------------
deploy_playstore:
  stage: deploy
  needs:
    - build_android
    - detect_changes
  before_script:
    - command -v fastlane &>/dev/null || gem install fastlane --no-document
  script:
    - echo "${PLAY_STORE_JSON_BASE64}" | base64 -d > play-store-key.json
    - |
      fastlane supply \
        --aab build/app/outputs/bundle/release/app-release.aab \
        --json_key play-store-key.json \
        --package_name com.kamillabs.kamiledu \
        --track internal \
        --skip_upload_metadata \
        --skip_upload_images \
        --skip_upload_screenshots
    - rm -f play-store-key.json
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
      allow_failure: false

# ---------------------------------------------------------------------------
# Stage 5b: Shorebird Release (new version + OTA baseline)
# Use when detect_changes says "release"
# ---------------------------------------------------------------------------
shorebird_release:
  <<: *shorebird_setup
  stage: deploy
  needs:
    - job: analyze
      optional: true
    - job: test
      optional: true
    - detect_changes
  script:
    - export PATH="$HOME/.shorebird/bin:$PATH"
    - shorebird release android --force --dart-define=API_BASE_URL=${API_BASE_URL}
  artifacts:
    paths:
      - build/app/outputs/bundle/release/app-release.aab
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
      allow_failure: false

# ---------------------------------------------------------------------------
# Stage 6: Shorebird Patch (OTA hotfix — no Play Store review)
# Use when detect_changes says "patch"
# ---------------------------------------------------------------------------
shorebird_patch:
  <<: *shorebird_setup
  stage: patch
  needs:
    - job: analyze
      optional: true
    - job: test
      optional: true
    - detect_changes
  script:
    - export PATH="$HOME/.shorebird/bin:$PATH"
    - shorebird patch android --force --dart-define=API_BASE_URL=${API_BASE_URL}
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
      allow_failure: false
