# GitLab CI/CD for KamilEdu Flutter App
# Stages: analyze → test → build → deploy (Play Store)
#
# Required CI/CD Variables (Settings → CI/CD → Variables):
#   API_BASE_URL          - API endpoint URL
#   KEYSTORE_BASE64       - base64-encoded .jks keystore file
#   KEY_ALIAS             - keystore key alias
#   KEY_PASSWORD          - key password
#   STORE_PASSWORD        - keystore password
#   PLAY_STORE_JSON_BASE64 - base64-encoded Google Play service account JSON
#
# To encode files for CI variables:
#   base64 -i upload-keystore.jks | pbcopy          (macOS)
#   base64 play-store-service-account.json | xclip   (Linux)

stages:
  - analyze
  - test
  - build
  - deploy

variables:
  FLUTTER_VERSION: "3.35.4"

# ---------------------------------------------------------------------------
# Reusable templates
# ---------------------------------------------------------------------------
.flutter_setup: &flutter_setup
  image: ghcr.io/cirruslabs/flutter:${FLUTTER_VERSION}
  before_script:
    - echo "API_BASE_URL=${API_BASE_URL}" > .env
    - flutter pub get

# ---------------------------------------------------------------------------
# Stage 1: Analyze
# ---------------------------------------------------------------------------
analyze:
  <<: *flutter_setup
  stage: analyze
  script:
    - flutter analyze --fatal-warnings
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ---------------------------------------------------------------------------
# Stage 2: Test
# ---------------------------------------------------------------------------
test:
  <<: *flutter_setup
  stage: test
  script:
    - flutter test --reporter=expanded
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ---------------------------------------------------------------------------
# Stage 3: Build release AAB (Android App Bundle)
# ---------------------------------------------------------------------------
build_android:
  <<: *flutter_setup
  stage: build
  script:
    # Decode keystore from CI variable
    - echo "${KEYSTORE_BASE64}" | base64 -d > android/app/upload-keystore.jks

    # Create key.properties for Gradle signing config
    - |
      cat > android/key.properties << EOF
      storePassword=${STORE_PASSWORD}
      keyPassword=${KEY_PASSWORD}
      keyAlias=${KEY_ALIAS}
      storeFile=upload-keystore.jks
      EOF

    # Build release AAB (Play Store requires AAB, not APK)
    - flutter build appbundle --release --dart-define=API_BASE_URL=${API_BASE_URL}

  artifacts:
    paths:
      - build/app/outputs/bundle/release/app-release.aab
    expire_in: 7 days
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ---------------------------------------------------------------------------
# Stage 4: Deploy to Play Store (internal track)
# ---------------------------------------------------------------------------
deploy_playstore:
  stage: deploy
  image: ruby:3.2
  needs:
    - build_android
  before_script:
    - gem install fastlane --no-document
  script:
    # Decode Google Play service account JSON
    - echo "${PLAY_STORE_JSON_BASE64}" | base64 -d > play-store-key.json

    # Upload AAB to Play Store internal testing track
    - |
      fastlane supply \
        --aab build/app/outputs/bundle/release/app-release.aab \
        --json_key play-store-key.json \
        --package_name com.kamillabs.kamiledu \
        --track internal \
        --skip_upload_metadata \
        --skip_upload_images \
        --skip_upload_screenshots

    - rm -f play-store-key.json
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
      allow_failure: false
