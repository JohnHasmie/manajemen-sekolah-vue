# GitLab CI/CD for KamilEdu Flutter App
#
# Pipeline flow:
#   Every push to any branch:  analyze → test
#   On main branch:            detect → auto-patch (if Dart-only) or manual release
#
# Auto-patch (Dart-only changes on main):
#   Automatically pushes OTA update via Shorebird to all users with the
#   latest release installed. No Play Store review needed.
#
# Manual release (native/plugin changes on main):
#   Click "release" button to create a new Shorebird release + upload
#   to Play Store. Required when native code, plugins, or assets change.
#
# Required CI/CD Variables:
#   API_BASE_URL           - API endpoint URL
#   KEYSTORE_BASE64        - base64-encoded .jks keystore
#   KEY_ALIAS, KEY_PASSWORD, STORE_PASSWORD
#   PLAY_STORE_JSON_BASE64 - base64-encoded Google Play service account JSON
#   SHOREBIRD_TOKEN        - Shorebird API key (console.shorebird.dev)

stages:
  - analyze
  - test
  - detect
  - deploy

variables:
  FLUTTER_VERSION: "3.41.6"
  # Exact commit Shorebird bundles for FLUTTER_VERSION. Both the
  # local Flutter SDK at $HOME/MobileProjects/flutter and Shorebird's
  # cached SDK at $HOME/.shorebird/bin/cache/flutter/<commit> must
  # resolve to the same framework+engine — otherwise pub get writes
  # package_config.json paths into a mismatched local SDK and
  # compilation fails. Bump this when bumping FLUTTER_VERSION; the
  # commit is printed in the `shorebird release/patch` log as e.g.
  # "Building patch with Flutter 3.41.6 (76ca3dff01)".
  FLUTTER_COMMIT: "76ca3dff01cc7c5e6978e6b51e442777c6930419"
  LC_ALL: "en_US.UTF-8"
  LANG: "en_US.UTF-8"
  GIT_STRATEGY: fetch

# ---------------------------------------------------------------------------
# Reusable templates
# ---------------------------------------------------------------------------
.flutter_setup: &flutter_setup
  before_script:
    - unset HTTP_PROXY HTTPS_PROXY http_proxy https_proxy
    - export PATH="$HOME/MobileProjects/flutter/bin:$HOME/.pub-cache/bin:$PATH"
    # Pin the LOCAL Flutter SDK to the same commit Shorebird bundles
    # (FLUTTER_COMMIT below). Previously `flutter upgrade --force`
    # would bump the runner's SDK past FLUTTER_VERSION, which made the
    # subsequent pub get write package_config.json paths into a newer
    # framework that referenced types missing from Shorebird's older
    # engine (DisplayCornerRadii, TextInputClient.onFocusReceived).
    # `|| true` keeps the job alive if the runner already has the
    # commit checked out (no-op fetch/checkout).
    - rm -f "$HOME/MobileProjects/flutter/.git/index.lock"
    - |
      cd "$HOME/MobileProjects/flutter"
      git fetch origin "${FLUTTER_COMMIT}" --depth=1 || true
      git checkout -- . || true
      git checkout "${FLUTTER_COMMIT}" || true
      cd -
    - flutter precache || true
    - flutter --version
    - echo "API_BASE_URL=${API_BASE_URL}" > .env
    - flutter pub get
    - |
      REGISTRANT="android/app/src/main/java/io/flutter/plugins/GeneratedPluginRegistrant.java"
      if [ -f "$REGISTRANT" ]; then
        sed -i.bak '/integration_test/d' "$REGISTRANT" && rm -f "${REGISTRANT}.bak"
      fi

.shorebird_setup: &shorebird_setup
  before_script:
    - unset HTTP_PROXY HTTPS_PROXY http_proxy https_proxy
    - export PATH="$HOME/MobileProjects/flutter/bin:$HOME/.pub-cache/bin:$HOME/.shorebird/bin:$PATH"
    # Stop Gradle daemons and release file locks before cleaning caches
    - (cd android && ./gradlew --stop) || true
    - pkill -f 'GradleDaemon' || true
    - pkill -f 'gradle' || true
    # Clean Gradle cache to prevent "Could not read workspace metadata"
    # errors. Gradle cache can get corrupted on long-running CI runners.
    - rm -rf ~/.gradle/caches || true
    # Pin to FLUTTER_COMMIT (same commit Shorebird bundles) — see
    # .flutter_setup above for the rationale. This is the load-bearing
    # change that keeps framework + engine in sync across local dev,
    # analyze/test, and shorebird release/patch.
    - rm -f "$HOME/MobileProjects/flutter/.git/index.lock"
    - |
      cd "$HOME/MobileProjects/flutter"
      git fetch origin "${FLUTTER_COMMIT}" --depth=1 || true
      git checkout -- . || true
      git checkout "${FLUTTER_COMMIT}" || true
      cd -
    - flutter precache || true
    - flutter --version
    - |
      if ! command -v shorebird &>/dev/null; then
        curl --proto '=https' --tlsv1.2 https://raw.githubusercontent.com/shorebirdtech/install/main/install.sh | bash
        export PATH="$HOME/.shorebird/bin:$PATH"
      fi
    - shorebird upgrade || true
    - echo "API_BASE_URL=${API_BASE_URL}" > .env
    - flutter pub get
    - |
      REGISTRANT="android/app/src/main/java/io/flutter/plugins/GeneratedPluginRegistrant.java"
      if [ -f "$REGISTRANT" ]; then
        sed -i.bak '/integration_test/d' "$REGISTRANT" && rm -f "${REGISTRANT}.bak"
      fi
    - echo "${KEYSTORE_BASE64}" | base64 -d > android/app/upload-keystore.jks
    - |
      cat > android/key.properties << EOF
      storePassword=${STORE_PASSWORD}
      keyPassword=${KEY_PASSWORD}
      keyAlias=${KEY_ALIAS}
      storeFile=upload-keystore.jks
      EOF

# ---------------------------------------------------------------------------
# Stage 1: Analyze
# ---------------------------------------------------------------------------
analyze:
  <<: *flutter_setup
  stage: analyze
  script:
    - flutter analyze --fatal-warnings --no-fatal-infos
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

# ---------------------------------------------------------------------------
# Stage 2: Test
# ---------------------------------------------------------------------------
test:
  <<: *flutter_setup
  stage: test
  script:
    - flutter test --reporter=expanded
  # BLOCKING: a failing test now fails the pipeline (was allow_failure:true +
  # manual-on-MR, which let 74 broken tests sit unnoticed). Runs automatically on
  # both MRs and branch pushes so test rot can't accumulate again.
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

# ---------------------------------------------------------------------------
# Stage 3: Detect changes → sets NEEDS_RELEASE variable for deploy stage
# ---------------------------------------------------------------------------
detect_changes:
  stage: detect
  script:
    - |
      NATIVE_PATTERNS="android/ ios/ macos/ linux/ windows/ web/ pubspec.yaml pubspec.lock shorebird.yaml"
    - |
      if [ "$CI_COMMIT_BEFORE_SHA" != "" ] && [ "$CI_COMMIT_BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
        BASE_SHA="$CI_COMMIT_BEFORE_SHA"
      else
        BASE_SHA="HEAD~1"
      fi
    - |
      CHANGED_FILES=$(git diff --name-only "$BASE_SHA" "$CI_COMMIT_SHA" 2>/dev/null || git diff --name-only HEAD~1 HEAD)
      echo "Changed files:"
      echo "$CHANGED_FILES"
    - |
      NEEDS_RELEASE=false
      for pattern in $NATIVE_PATTERNS; do
        if echo "$CHANGED_FILES" | grep -q "^${pattern}"; then
          NEEDS_RELEASE=true
        fi
      done
    - |
      echo ""
      echo "Pipeline IID: ${CI_PIPELINE_IID}"
      echo "NEEDS_RELEASE: ${NEEDS_RELEASE}"
      echo ""
      # Write to dotenv artifact so downstream jobs can read the variable
      echo "NEEDS_RELEASE=${NEEDS_RELEASE}" > deploy.env
    - |
      if [ "$NEEDS_RELEASE" = "true" ]; then
        echo "🚀 RELEASE needed — native/plugin changes detected"
        echo "   → Click: release (builds + uploads to Play Store)"
      else
        echo "⚡ AUTO-PATCH — Dart-only changes detected"
        echo "   → Patch will run automatically"
      fi
  artifacts:
    reports:
      dotenv: deploy.env
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ---------------------------------------------------------------------------
# Release (manual) — Shorebird release + Play Store upload
#
# Creates a new Shorebird-enabled build with OTA engine and uploads
# to Google Play Store (alpha track). Required when native code changes.
# ---------------------------------------------------------------------------
release:
  <<: *shorebird_setup
  stage: deploy
  needs: ["detect_changes"]
  # Pick the Play Console track when triggering the job from the GitLab
  # UI ("Run pipeline" → set DEPLOY_TRACK to one of):
  #   internal — Internal testing (fastest, trusted testers only)
  #   alpha    — Closed testing  (default; what alpha/beta channels used to be)
  #   beta     — Open testing    (any user with the opt-in link)
  #   production — Production rollout (don't pick this from CI)
  # Defaults to alpha so existing flows are unchanged; override per-run
  # to publish straight to open testing without a manual promotion step.
  variables:
    DEPLOY_TRACK: alpha
  script:
    - export PATH="$HOME/.shorebird/bin:$PATH"
    - |
      VERSION_NAME=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
      BUILD_NUMBER=${CI_PIPELINE_IID}
      echo "═══════════════════════════════════════════"
      echo "  Release: ${VERSION_NAME}+${BUILD_NUMBER}"
      echo "═══════════════════════════════════════════"
    # Note: `--no-pub` was dropped here. The .shorebird_setup template
    # runs `flutter pub get` with the LOCAL Flutter SDK (which gets
    # bumped past FLUTTER_VERSION by the `flutter upgrade --force`
    # earlier), so .dart_tool/package_config.json ends up pointing to
    # the local SDK's framework sources. With `--no-pub`, Shorebird's
    # bundled flutter compiles those mismatched sources against the
    # bundled (older) engine — surfacing as "Type 'DisplayCornerRadii'
    # not found" and flutter_quill missing TextInputClient.
    # onFocusReceived. Letting Shorebird re-run pub get rewrites
    # package_config.json with paths to the bundled SDK matching
    # FLUTTER_VERSION, so framework + engine line up.
    - shorebird release android --flutter-version=${FLUTTER_VERSION} --build-name=${VERSION_NAME} --build-number=${BUILD_NUMBER} --dart-define=API_BASE_URL=${API_BASE_URL} -- --no-tree-shake-icons
    - command -v fastlane &>/dev/null || gem install fastlane --no-document
    - echo "${PLAY_STORE_JSON_BASE64}" | base64 -d > play-store-key.json
    - |
      # `release_status completed` forces fastlane to fully roll out the
      # AAB on the alpha track instead of leaving it as a draft. This is
      # what prevents the "completely shadowed by higher version code"
      # Play Console error from re-occurring — if a prior run left a
      # draft, a new `completed` upload replaces it cleanly. The
      # mapping.txt path is what makes obfuscated stack traces in Play
      # vitals deobfuscate automatically; matches the R8 output we now
      # produce because `isMinifyEnabled = true` in build.gradle.kts.
      fastlane supply \
        --aab build/app/outputs/bundle/release/app-release.aab \
        --mapping build/app/outputs/mapping/release/mapping.txt \
        --release_status completed \
        --json_key play-store-key.json \
        --package_name com.kamillabs.kamiledu \
        --track "${DEPLOY_TRACK}" \
        --skip_upload_metadata \
        --skip_upload_images \
        --skip_upload_screenshots
    - rm -f play-store-key.json
    - |
      echo ""
      echo "✅ Released ${VERSION_NAME}+${BUILD_NUMBER}"
      echo "   Shorebird: registered for OTA patches"
      echo "   Play Store: uploaded to ${DEPLOY_TRACK} track"
  artifacts:
    paths:
      - build/app/outputs/bundle/release/app-release.aab
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
      allow_failure: false

# ---------------------------------------------------------------------------
# Patch (automatic) — OTA update to latest release
#
# Runs automatically on main when only Dart/asset changes are detected.
# Pushes an instant OTA patch via Shorebird — no Play Store review needed.
# Users get the update on next app restart.
#
# Can also be triggered manually (e.g. after a release, or to force-patch).
# Set SKIP_AUTO_PATCH=true in CI variables to disable auto-patching.
# ---------------------------------------------------------------------------
patch:
  <<: *shorebird_setup
  stage: deploy
  needs: ["detect_changes"]
  script:
    - export PATH="$HOME/.shorebird/bin:$PATH"
    - |
      echo "═══════════════════════════════════════════"
      echo "  Patching latest release (OTA)..."
      echo "  NEEDS_RELEASE: ${NEEDS_RELEASE:-unknown}"
      echo "═══════════════════════════════════════════"
    # `--no-pub` removed for the same reason as the release job above:
    # the pre-job `flutter pub get` ran with the LOCAL upgraded SDK,
    # leaving package_config.json pointing to mismatched framework
    # sources. Letting Shorebird's bundled flutter re-do pub get
    # ensures the patch compiles against framework + engine of the
    # same version as the release it's patching.
    - shorebird patch android --release-version=latest --allow-asset-diffs --dart-define=API_BASE_URL=${API_BASE_URL}
    - |
      echo ""
      echo "✅ Patch pushed — users will receive it on next app restart"
  rules:
    # Auto-patch: runs automatically when Dart-only changes on main
    # (NEEDS_RELEASE=false from detect_changes job)
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $NEEDS_RELEASE == "false" && $SKIP_AUTO_PATCH != "true"
      when: on_success
    # Manual fallback: always available as a manual button on main
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
      allow_failure: true

# ---------------------------------------------------------------------------
# Promote (manual) — move an existing AAB between Play Store tracks
#
# Use when an AAB is already live on a track (e.g. alpha / closed
# testing) and you want to push the same build up to a wider audience
# (e.g. beta / open testing, or production) without rebuilding.
#
# How to run:
#   GitLab → CI/CD → Pipelines → Run pipeline → set variables:
#     PROMOTE_FROM_TRACK = alpha       (source — what's currently live)
#     PROMOTE_TO_TRACK   = beta        (destination — open testing)
#   Then click the manual ▶ on the promote_to_beta job.
#
# No flutter / shorebird / keystore needed — promotion only talks to
# the Play API, so the before_script is intentionally minimal (just
# install fastlane). The Shorebird release-tracking row on the source
# track is unaffected; OTA patches continue to work for users on the
# promoted version because it's the same AAB.
# ---------------------------------------------------------------------------
promote_to_beta:
  stage: deploy
  needs: []
  variables:
    PROMOTE_FROM_TRACK: alpha
    PROMOTE_TO_TRACK: beta
  before_script:
    - unset HTTP_PROXY HTTPS_PROXY http_proxy https_proxy
    - command -v fastlane &>/dev/null || gem install fastlane --no-document
  script:
    - echo "${PLAY_STORE_JSON_BASE64}" | base64 -d > play-store-key.json
    - |
      echo "═══════════════════════════════════════════"
      echo "  Promoting Play release"
      echo "  From: ${PROMOTE_FROM_TRACK}"
      echo "  To:   ${PROMOTE_TO_TRACK}"
      echo "═══════════════════════════════════════════"
    - |
      # `--track_promote_to` moves the current active release on
      # `--track` to the destination track. Skip the AAB upload flags
      # so fastlane doesn't try to re-upload a binary — promotion is
      # purely a metadata move on Play's side.
      # `--release_status completed` rolls out the promoted release
      # fully; without it the promotion lands as a draft on the new
      # track and you'd have to publish it manually in Play Console.
      fastlane supply \
        --json_key play-store-key.json \
        --package_name com.kamillabs.kamiledu \
        --track "${PROMOTE_FROM_TRACK}" \
        --track_promote_to "${PROMOTE_TO_TRACK}" \
        --release_status completed \
        --skip_upload_aab true \
        --skip_upload_apk true \
        --skip_upload_metadata true \
        --skip_upload_images true \
        --skip_upload_screenshots true \
        --skip_upload_changelogs true
    - rm -f play-store-key.json
    - |
      echo ""
      echo "✅ Promoted ${PROMOTE_FROM_TRACK} → ${PROMOTE_TO_TRACK}"
      echo "   No rebuild, no review-cycle restart — same AAB."
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
      allow_failure: false

# ---------------------------------------------------------------------------
# Promote to Production (manual) — graduate a Play Store release
#
# Promotes the current active release on PROMOTE_FROM_TRACK (default
# beta / open testing) up to production with a STAGED rollout. The
# defaults give you a safe 10% first wave so you can watch Vitals
# before opening the floodgates; bump ROLLOUT_FRACTION to 1.0 once
# you're confident.
#
# How to run:
#   GitLab → CI/CD → Pipelines → Run pipeline → set variables:
#     PROMOTE_FROM_TRACK = beta        (or alpha — whatever's live)
#     ROLLOUT_FRACTION   = 0.1         (10% staged rollout)
#   Then click the manual ▶ on the promote_to_prod job.
#
# To go to 100% later: re-run with ROLLOUT_FRACTION=1.0 (Play accepts
# raising a halted/staged rollout to a higher fraction without touching
# the AAB). To halt a bad rollout: do it from Play Console — fastlane
# doesn't expose a `halt` verb cleanly.
#
# Same minimal before_script as promote_to_beta — no build needed.
# ---------------------------------------------------------------------------
promote_to_prod:
  stage: deploy
  needs: []
  variables:
    PROMOTE_FROM_TRACK: alpha
    # Staged rollout fraction (0.0–1.0). Default 0.1 = 10% of users get
    # the new release; the rest stay on the previous prod version. Keep
    # this low for the first push; raise to 1.0 once Vitals look clean.
    ROLLOUT_FRACTION: "0.1"
  before_script:
    - unset HTTP_PROXY HTTPS_PROXY http_proxy https_proxy
    - command -v fastlane &>/dev/null || gem install fastlane --no-document
  script:
    - echo "${PLAY_STORE_JSON_BASE64}" | base64 -d > play-store-key.json
    - |
      echo "═══════════════════════════════════════════"
      echo "  Promoting to PRODUCTION"
      echo "  From:           ${PROMOTE_FROM_TRACK}"
      echo "  Rollout:        ${ROLLOUT_FRACTION} (= $(awk "BEGIN{print ${ROLLOUT_FRACTION}*100}")% of users)"
      echo "═══════════════════════════════════════════"
    - |
      # `--release_status inProgress` is what makes fastlane treat the
      # rollout as staged instead of a full 100% release. Combined with
      # `--rollout`, Play serves the new AAB to that fraction of users
      # and keeps the previous release for the rest until you raise the
      # number. Skipping every upload flag keeps this a pure metadata
      # promotion — same AAB, no review-cycle restart, no changelog
      # overwrite.
      fastlane supply \
        --json_key play-store-key.json \
        --package_name com.kamillabs.kamiledu \
        --track "${PROMOTE_FROM_TRACK}" \
        --track_promote_to production \
        --release_status inProgress \
        --rollout "${ROLLOUT_FRACTION}" \
        --skip_upload_aab true \
        --skip_upload_apk true \
        --skip_upload_metadata true \
        --skip_upload_images true \
        --skip_upload_screenshots true \
        --skip_upload_changelogs true
    - rm -f play-store-key.json
    - |
      echo ""
      echo "✅ Promoted ${PROMOTE_FROM_TRACK} → production (${ROLLOUT_FRACTION})"
      echo "   Same AAB binary, staged rollout active."
      echo "   Watch Play Console → Statistics → Vitals before raising %."
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
      allow_failure: false
