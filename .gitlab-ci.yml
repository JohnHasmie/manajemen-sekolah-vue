# GitLab CI/CD for KamilEdu Flutter App
#
# Pipeline flow:
#   Every push:      analyze (auto) → test (skippable) → detect_changes
#   Manual buttons:  deploy_playstore | shorebird_release | shorebird_patch
#
# Version code uses CI_PIPELINE_IID (auto-incrementing per project).
# No git push needed — no CI_GIT_PUSH_TOKEN required.
#
# Required CI/CD Variables:
#   API_BASE_URL           - API endpoint URL
#   KEYSTORE_BASE64        - base64-encoded .jks keystore
#   KEY_ALIAS, KEY_PASSWORD, STORE_PASSWORD
#   PLAY_STORE_JSON_BASE64 - base64-encoded Google Play service account JSON
#   SHOREBIRD_TOKEN        - Shorebird API key (console.shorebird.dev)

stages:
  - analyze
  - test
  - detect
  - deploy

variables:
  FLUTTER_VERSION: "3.35.4"
  LC_ALL: "en_US.UTF-8"
  LANG: "en_US.UTF-8"
  GIT_STRATEGY: fetch

# ---------------------------------------------------------------------------
# Reusable templates
# ---------------------------------------------------------------------------
.flutter_setup: &flutter_setup
  before_script:
    - export PATH="$HOME/MobileProjects/flutter/bin:$HOME/.pub-cache/bin:$PATH"
    - echo "API_BASE_URL=${API_BASE_URL}" > .env
    - flutter pub get
    # Remove integration_test from GeneratedPluginRegistrant (dev-only, breaks release builds)
    - |
      REGISTRANT="android/app/src/main/java/io/flutter/plugins/GeneratedPluginRegistrant.java"
      if [ -f "$REGISTRANT" ]; then
        sed -i '' '/integration_test/d' "$REGISTRANT"
      fi

.shorebird_setup: &shorebird_setup
  before_script:
    - export PATH="$HOME/MobileProjects/flutter/bin:$HOME/.pub-cache/bin:$HOME/.shorebird/bin:$PATH"
    - |
      if ! command -v shorebird &>/dev/null; then
        curl --proto '=https' --tlsv1.2 https://raw.githubusercontent.com/shorebirdtech/install/main/install.sh | bash
      fi
    - echo "API_BASE_URL=${API_BASE_URL}" > .env
    - flutter pub get
    # Remove integration_test from GeneratedPluginRegistrant (dev-only, breaks release builds)
    - |
      REGISTRANT="android/app/src/main/java/io/flutter/plugins/GeneratedPluginRegistrant.java"
      if [ -f "$REGISTRANT" ]; then
        sed -i '' '/integration_test/d' "$REGISTRANT"
      fi
    - echo "${KEYSTORE_BASE64}" | base64 -d > android/app/upload-keystore.jks
    - |
      cat > android/key.properties << EOF
      storePassword=${STORE_PASSWORD}
      keyPassword=${KEY_PASSWORD}
      keyAlias=${KEY_ALIAS}
      storeFile=upload-keystore.jks
      EOF

.setup_keystore: &setup_keystore
  - echo "${KEYSTORE_BASE64}" | base64 -d > android/app/upload-keystore.jks
  - |
    cat > android/key.properties << EOF
    storePassword=${STORE_PASSWORD}
    keyPassword=${KEY_PASSWORD}
    keyAlias=${KEY_ALIAS}
    storeFile=upload-keystore.jks
    EOF

# ---------------------------------------------------------------------------
# Stage 1: Analyze (auto — must pass)
# ---------------------------------------------------------------------------
analyze:
  <<: *flutter_setup
  stage: analyze
  script:
    - flutter analyze --fatal-warnings
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

# ---------------------------------------------------------------------------
# Stage 2: Test (auto but skippable)
# ---------------------------------------------------------------------------
test:
  <<: *flutter_setup
  stage: test
  script:
    - flutter test --reporter=expanded
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
    - if: $CI_COMMIT_BRANCH

# ---------------------------------------------------------------------------
# Stage 3: Detect changes (patch vs release recommendation)
# ---------------------------------------------------------------------------
detect_changes:
  stage: detect
  script:
    - echo "Detecting changes..."
    - |
      NATIVE_PATTERNS="android/ ios/ macos/ linux/ windows/ web/ pubspec.yaml pubspec.lock shorebird.yaml"
    - |
      if [ "$CI_COMMIT_BEFORE_SHA" != "" ] && [ "$CI_COMMIT_BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
        BASE_SHA="$CI_COMMIT_BEFORE_SHA"
      else
        BASE_SHA="HEAD~1"
      fi
    - |
      CHANGED_FILES=$(git diff --name-only "$BASE_SHA" "$CI_COMMIT_SHA" 2>/dev/null || git diff --name-only HEAD~1 HEAD)
      echo "$CHANGED_FILES"
    - |
      NEEDS_RELEASE=false
      for pattern in $NATIVE_PATTERNS; do
        if echo "$CHANGED_FILES" | grep -q "^${pattern}"; then
          NEEDS_RELEASE=true
        fi
      done
    - |
      echo ""
      echo "Pipeline IID: ${CI_PIPELINE_IID} (used as build number)"
      echo ""
      if [ "$NEEDS_RELEASE" = "true" ]; then
        echo "🚀 RELEASE REQUIRED — native/plugin changes detected"
        echo "   → Click: shorebird_release, then deploy_playstore"
      else
        echo "⚡ PATCH OK — Dart-only changes"
        echo "   → Click: shorebird_patch (instant OTA)"
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ---------------------------------------------------------------------------
# Deploy to Play Store (manual)
# Uses CI_PIPELINE_IID as build number — always unique, always increasing
# ---------------------------------------------------------------------------
deploy_playstore:
  <<: *flutter_setup
  stage: deploy
  script:
    - *setup_keystore
    - |
      VERSION_NAME=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
      BUILD_NUMBER=${CI_PIPELINE_IID}
      echo "Building ${VERSION_NAME}+${BUILD_NUMBER}"
    - flutter build appbundle --release --build-name=${VERSION_NAME} --build-number=${BUILD_NUMBER} --dart-define=API_BASE_URL=${API_BASE_URL}
    - command -v fastlane &>/dev/null || gem install fastlane --no-document
    - echo "${PLAY_STORE_JSON_BASE64}" | base64 -d > play-store-key.json
    - |
      fastlane supply \
        --aab build/app/outputs/bundle/release/app-release.aab \
        --json_key play-store-key.json \
        --package_name com.kamillabs.kamiledu \
        --track alpha \
        --skip_upload_metadata \
        --skip_upload_images \
        --skip_upload_screenshots
    - rm -f play-store-key.json
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
      allow_failure: false

# ---------------------------------------------------------------------------
# Shorebird Release (manual)
# Creates Shorebird-enabled release with CI_PIPELINE_IID as build number
# ---------------------------------------------------------------------------
shorebird_release:
  <<: *shorebird_setup
  stage: deploy
  script:
    - export PATH="$HOME/.shorebird/bin:$PATH"
    - |
      VERSION_NAME=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
      BUILD_NUMBER=${CI_PIPELINE_IID}
      echo "Shorebird release ${VERSION_NAME}+${BUILD_NUMBER}"
    - shorebird release android --flutter-version=${FLUTTER_VERSION} --build-name=${VERSION_NAME} --build-number=${BUILD_NUMBER} --dart-define=API_BASE_URL=${API_BASE_URL} -- --no-pub
  artifacts:
    paths:
      - build/app/outputs/bundle/release/app-release.aab
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
      allow_failure: false

# ---------------------------------------------------------------------------
# Shorebird Patch (manual)
# NO version change — patches the latest release via OTA
# ---------------------------------------------------------------------------
shorebird_patch:
  <<: *shorebird_setup
  stage: deploy
  script:
    - export PATH="$HOME/.shorebird/bin:$PATH"
    - shorebird patch android --release-version=latest --dart-define=API_BASE_URL=${API_BASE_URL} -- --no-pub
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
      allow_failure: false
