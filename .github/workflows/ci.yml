name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FLUTTER_VERSION: "3.35.4"

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Create .env
        run: echo "API_BASE_URL=${{ secrets.API_BASE_URL }}" > .env

      - run: flutter pub get
      - run: flutter analyze --fatal-warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Create .env
        run: echo "API_BASE_URL=${{ secrets.API_BASE_URL }}" > .env

      - run: flutter pub get
      - run: flutter test --reporter=github

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: [analyze, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      # Minimal .env kept because flutter_dotenv.load() expects the asset to exist.
      # The --dart-define value takes priority at runtime (see ApiService.init).
      - name: Create .env
        run: echo "API_BASE_URL=${{ secrets.API_BASE_URL }}" > .env

      - run: flutter pub get
      - run: flutter build apk --debug --dart-define=API_BASE_URL=${{ secrets.API_BASE_URL }}

  build-ios:
    name: Build iOS
    runs-on: macos-latest
    needs: [analyze, test]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Create .env
        run: echo "API_BASE_URL=${{ secrets.API_BASE_URL }}" > .env

      - run: flutter pub get
      - run: flutter build ios --no-codesign --debug --dart-define=API_BASE_URL=${{ secrets.API_BASE_URL }}
