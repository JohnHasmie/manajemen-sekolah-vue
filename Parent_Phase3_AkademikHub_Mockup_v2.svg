<svg viewBox="0 0 400 960" xmlns="http://www.w3.org/2000/svg" role="img" style="display:block;margin:0 auto;max-width:400px;width:100%;background:#F8FAFC;border-radius:24px;border:0.5px solid rgba(0,0,0,0.08)">
  <title>Parent Akademik hub - v2 compact</title>
  <desc>Tighter alternative to v1: shorter hero (no helper line, no PILIH ANAK chips at the hub level — children switch in deep screens), and smaller feature cards (44px icon tile, 14pt title, 11pt subtitle, 64px row height). Saves ~200px of vertical real estate so the layout feels proportional next to other parent screens. Optional 'Aktivitas terbaru' preview strip below the cards surfaces the latest 1-2 unread items inline so the hub still earns its keep as a landing page.</desc>
  <defs>
    <linearGradient id="azAH2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#21AFE6"/>
      <stop offset="100%" stop-color="#1A8FBE"/>
    </linearGradient>
  </defs>

  <!-- Hero — shorter (160px), no PILIH ANAK row at hub level -->
  <rect x="0" y="0" width="400" height="160" fill="url(#azAH2)"/>
  <text x="24" y="28" font-family="system-ui,sans-serif" font-size="11" fill="#FFFFFF" opacity="0.7" font-weight="500">08:14</text>
  <g transform="translate(352,22)" fill="#FFFFFF" opacity="0.8">
    <rect x="0" y="0" width="14" height="9" rx="2"/><rect x="16" y="2" width="10" height="5" rx="1"/>
  </g>
  <text x="20" y="80" font-family="system-ui,sans-serif" font-size="11" fill="#FFFFFF" font-weight="600">Untuk anak Anda</text>
  <text x="20" y="108" font-family="system-ui,sans-serif" font-size="22" fill="#FFFFFF" font-weight="800" letter-spacing="0.1">Akademik</text>
  <text x="20" y="128" font-family="system-ui,sans-serif" font-size="11.5" fill="#FFFFFF" font-weight="500">Pantau nilai, raport, kegiatan &amp; pengumuman</text>

  <!-- Card 1: Nilai (compact, 64px tall) -->
  <rect x="16" y="184" width="368" height="64" rx="14" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="0.75"/>
  <rect x="28" y="194" width="44" height="44" rx="11" fill="#DCFCE7"/>
  <g transform="translate(40,206)" fill="none" stroke="#15803D" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M10 2l2.5 5.5l6 0.5l-4.5 4l1.5 6l-5.5 -3l-5.5 3l1.5 -6l-4.5 -4l6 -0.5z"/>
  </g>
  <text x="86" y="213" font-family="system-ui,sans-serif" font-size="14" fill="#0F172A" font-weight="700">Nilai</text>
  <text x="86" y="232" font-family="system-ui,sans-serif" font-size="11" fill="#64748B" font-weight="500">Daftar penilaian per mapel</text>
  <path d="M352 212 l6 6 l-6 6" fill="none" stroke="#94A3B8" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Card 2: E-Raport -->
  <rect x="16" y="260" width="368" height="64" rx="14" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="0.75"/>
  <rect x="28" y="270" width="44" height="44" rx="11" fill="#DBEAFE"/>
  <g transform="translate(38,282)" fill="none" stroke="#1D4ED8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <rect x="2" y="2" width="16" height="20" rx="2"/>
    <path d="M5 7h10M5 11h10M5 15h7"/>
  </g>
  <text x="86" y="289" font-family="system-ui,sans-serif" font-size="14" fill="#0F172A" font-weight="700">E-Raport</text>
  <text x="86" y="308" font-family="system-ui,sans-serif" font-size="11" fill="#64748B" font-weight="500">Ringkasan rapor tiap semester</text>
  <path d="M352 288 l6 6 l-6 6" fill="none" stroke="#94A3B8" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Card 3: Kegiatan Kelas -->
  <rect x="16" y="336" width="368" height="64" rx="14" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="0.75"/>
  <rect x="28" y="346" width="44" height="44" rx="11" fill="#FEF3C7"/>
  <g transform="translate(38,358)" fill="none" stroke="#B45309" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M2 4h16M2 9h12M2 14h8"/>
    <circle cx="16" cy="14" r="2.5" fill="#FEF3C7"/>
  </g>
  <text x="86" y="365" font-family="system-ui,sans-serif" font-size="14" fill="#0F172A" font-weight="700">Kegiatan Kelas</text>
  <text x="86" y="384" font-family="system-ui,sans-serif" font-size="11" fill="#64748B" font-weight="500">Tugas &amp; materi yang diberikan guru</text>
  <path d="M352 364 l6 6 l-6 6" fill="none" stroke="#94A3B8" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Card 4: Pengumuman -->
  <rect x="16" y="412" width="368" height="64" rx="14" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="0.75"/>
  <rect x="28" y="422" width="44" height="44" rx="11" fill="#E0F2FE"/>
  <g transform="translate(38,432)" fill="none" stroke="#0E7490" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M2 7c0 -2.5 2 -4.5 4.5 -4.5h7c2.5 0 4.5 2 4.5 4.5v3c0 2.5 -2 4.5 -4.5 4.5h-3l-4 4v-4h-0c-2.5 0 -4.5 -2 -4.5 -4.5z"/>
  </g>
  <text x="86" y="441" font-family="system-ui,sans-serif" font-size="14" fill="#0F172A" font-weight="700">Pengumuman</text>
  <text x="86" y="460" font-family="system-ui,sans-serif" font-size="11" fill="#64748B" font-weight="500">Informasi resmi dari sekolah</text>
  <path d="M352 440 l6 6 l-6 6" fill="none" stroke="#94A3B8" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Optional preview strip — surfaces the latest unread item so the hub
       still earns its keep as a landing page (not just a launcher). -->
  <text x="24" y="514" font-family="system-ui,sans-serif" font-size="11" fill="#64748B" font-weight="700" letter-spacing="0.4">AKTIVITAS TERBARU</text>

  <rect x="16" y="528" width="368" height="74" rx="14" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="0.75"/>
  <circle cx="44" cy="565" r="14" fill="#FEE2E2"/>
  <g transform="translate(36,557)" fill="none" stroke="#DC2626" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M8 0v8M8 12h0"/>
  </g>
  <text x="68" y="554" font-family="system-ui,sans-serif" font-size="11" fill="#64748B" font-weight="500">Pengumuman · Sekolah</text>
  <text x="368" y="554" font-family="system-ui,sans-serif" font-size="11" fill="#94A3B8" font-weight="500" text-anchor="end">2 jam lalu</text>
  <text x="68" y="572" font-family="system-ui,sans-serif" font-size="13" fill="#0F172A" font-weight="600">Libur HUT Sekolah · 30 Oktober</text>
  <text x="68" y="590" font-family="system-ui,sans-serif" font-size="11" fill="#64748B" font-weight="500">Kegiatan belajar diliburkan tanggal 30/10…</text>

  <rect x="16" y="614" width="368" height="74" rx="14" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="0.75"/>
  <circle cx="44" cy="651" r="14" fill="#DCFCE7"/>
  <g transform="translate(36,643)" fill="none" stroke="#15803D" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 8l4 4l8 -8"/>
  </g>
  <text x="68" y="640" font-family="system-ui,sans-serif" font-size="11" fill="#64748B" font-weight="500">Nilai · Matematika</text>
  <text x="368" y="640" font-family="system-ui,sans-serif" font-size="11" fill="#94A3B8" font-weight="500" text-anchor="end">25 Okt</text>
  <text x="68" y="658" font-family="system-ui,sans-serif" font-size="13" fill="#0F172A" font-weight="600">UH 4 — Bilangan Berpangkat</text>
  <rect x="68" y="670" width="44" height="20" rx="10" fill="#DCFCE7"/>
  <text x="90" y="683" font-family="system-ui,sans-serif" font-size="10.5" fill="#15803D" font-weight="700" text-anchor="middle">A · 96</text>

  <!-- Bottom nav -->
  <rect x="0" y="876" width="400" height="84" fill="#FFFFFF"/>
  <line x1="0" y1="876" x2="400" y2="876" stroke="#E2E8F0" stroke-width="1"/>
  <g transform="translate(40,894)" fill="none" stroke="#94A3B8" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
    <path d="M2 12 L12 2 L22 12 v10 a2 2 0 0 1 -2 2 H4 a2 2 0 0 1 -2 -2 z"/>
  </g>
  <text x="50" y="934" font-family="system-ui,sans-serif" font-size="10" fill="#94A3B8" font-weight="500" text-anchor="middle">Beranda</text>
  <g transform="translate(120,894)" fill="none" stroke="#1A8FBE" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
    <path d="M0 6 L12 0 L24 6 L12 12 z"/><path d="M5 9 v6 c0 2 3 3 7 3 s7 -1 7 -3 v-6"/>
  </g>
  <text x="132" y="934" font-family="system-ui,sans-serif" font-size="10" fill="#1A8FBE" font-weight="700" text-anchor="middle">Akademik</text>
  <g transform="translate(200,894)" fill="none" stroke="#94A3B8" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
    <rect x="0.5" y="2" width="22" height="20" rx="3"/><path d="M0 8h23M6 0v4M17 0v4"/><path d="M7 14l3 3l6 -7"/>
  </g>
  <text x="212" y="934" font-family="system-ui,sans-serif" font-size="10" fill="#94A3B8" font-weight="500" text-anchor="middle">Kehadiran</text>
  <g transform="translate(280,894)" fill="none" stroke="#94A3B8" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
    <rect x="1" y="3" width="22" height="18" rx="3"/><path d="M1 9h22"/><circle cx="18" cy="15" r="2"/>
  </g>
  <text x="292" y="934" font-family="system-ui,sans-serif" font-size="10" fill="#94A3B8" font-weight="500" text-anchor="middle">Keuangan</text>
</svg>
