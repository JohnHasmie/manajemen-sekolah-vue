<svg viewBox="0 0 1240 1080" xmlns="http://www.w3.org/2000/svg" role="img" style="display:block;margin:0 auto;max-width:1240px;width:100%;background:#E2E8F0;border-radius:16px;padding:24px 0">
  <title>BrandEmptyState — shared empty/error/filtered state component</title>
  <desc>Three variants of a shared parent-screen empty state widget. Each variant takes the same props (icon, kicker, title, subtitle, primary/secondary action) and renders the same chrome. Variant 1 default no-data, variant 2 filtered with Reset CTA, variant 3 connection error with Retry CTA.</desc>
