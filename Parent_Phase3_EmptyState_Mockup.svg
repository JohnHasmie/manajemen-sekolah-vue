  <text x="40" y="982" font-family="ui-monospace,Menlo,monospace" font-size="11" fill="#475569">tone: 'info'|'warning'|'danger'|'success'  // routes the kicker color + bubble palette</text>
  <text x="40" y="1000" font-family="ui-monospace,Menlo,monospace" font-size="11" fill="#475569">kicker?: String         // small SCREAMING label above title (auto-uppercased)</text>
  <text x="40" y="1018" font-family="ui-monospace,Menlo,monospace" font-size="11" fill="#475569">title: String           // 17px slate-900 800</text>
  <text x="40" y="1036" font-family="ui-monospace,Menlo,monospace" font-size="11" fill="#475569">message?: String        // slate-600 12px, multi-line</text>
  <text x="40" y="1054" font-family="ui-monospace,Menlo,monospace" font-size="11" fill="#475569">primaryAction?: ({ label, icon?, onTap }) // azure-deep filled button</text>
  <text x="640" y="964" font-family="ui-monospace,Menlo,monospace" font-size="11" fill="#475569">secondaryAction?: ({ label, icon?, onTap }) // outline slate-700 button</text>
  <text x="640" y="982" font-family="ui-monospace,Menlo,monospace" font-size="11" fill="#475569">helper?: String         // small italic slate-400 line under buttons</text>
