# ═══════════════════════════════════════════════════════════════════════════════
# Kamiledu Mobile — Analysis & Code Quality Configuration
# ═══════════════════════════════════════════════════════════════════════════════
#
# This file configures two layers of code quality enforcement:
#
#   1. Dart Analyzer + Linter — built-in static analysis (errors, warnings, lints)
#   2. Code quality script    — enforces file/method length limits
#
# ─── Code Quality Standards ───────────────────────────────────────────────────
#
#   MAX LINE LENGTH:      80 characters (formatter + lint enforced)
#   MAX FILE LENGTH:      400 lines per widget/class file
#   MAX METHOD LENGTH:    40 lines per method/function
#   MAX NESTING DEPTH:    5 levels (if/for/while nested blocks)
#
# ─── Why These Limits? ────────────────────────────────────────────────────────
#
#   * Files >400 lines  -> widget is doing too much; split into components
#   * Methods >40 lines -> break into focused helper functions
#   * 80-char lines     -> readable without horizontal scrolling (Effective Dart)
#   * For AI-assisted dev, 150-500 line files maintain best context accuracy
#
# ─── How to Enforce ──────────────────────────────────────────────────────────
#
#   Line length (80 chars):
#     Enforced automatically by `dart format` and the `lines_longer_than_80_chars`
#     lint rule below. Shows warnings in IDE and `flutter analyze`.
#
#   File length (400 lines) & Method length (40 lines):
#     Run the code quality check script:
#
#       dart run tool/code_quality_check.dart          # scan lib/
#       dart run tool/code_quality_check.dart --fix     # with fix suggestions
#       dart run tool/code_quality_check.dart lib/core  # scan specific dir
#
#     Returns exit code 1 if violations found — use in CI/pre-commit hooks.
#
# ═══════════════════════════════════════════════════════════════════════════════

include: package:flutter_lints/flutter.yaml

# ─── Dart Analyzer ────────────────────────────────────────────────────────────
analyzer:
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "web-vue/**"

  errors:
    # Freezed 2.x generates @JsonKey on constructor params which
    # json_annotation 4.7+ flags as invalid_annotation_target.
    invalid_annotation_target: ignore
    # Post-refactor cleanup: downgrade non-critical warnings to info so
    # --fatal-warnings doesn't block CI. The DD.* sweep removed every
    # outstanding violation, so a future PR can safely flip these back
    # to `warning` (or remove the override entirely).
    unused_element: info
    unused_field: info
    unused_import: info
    unused_local_variable: info
    unused_element_parameter: info
    override_on_non_overriding_member: info
    unnecessary_cast: info
    # `use_build_context_synchronously` is `info` in our pinned SDK, but newer
    # Dart SDKs / flutter_lints promote it to `warning` — which intermittently
    # failed CI's `flutter analyze --fatal-warnings` depending on the runner's
    # SDK version. Pin it to `info` so analysis severity is deterministic
    # across environments. (Follow-up: add `if (!context.mounted) return;`
    # guards at the 21 call sites, then drop this override.)
    use_build_context_synchronously: info

# ─── Dart Linter ──────────────────────────────────────────────────────────────
linter:
  rules:
    # ── Import Hygiene ──
    always_use_package_imports: true

    # ── Type Safety ──
    avoid_dynamic_calls: false

    # ── Immutability ──
    prefer_final_locals: true
    prefer_final_in_for_each: true

    # ── Code Clarity ──
    unnecessary_lambdas: true
    unnecessary_string_interpolations: true
    unnecessary_this: true
    unnecessary_parenthesis: true

    # ── Line Length (80 chars) ──
    # Warns on any line exceeding 80 characters.
    # The formatter also enforces this, but the lint catches manually
    # formatted code (e.g. long strings, URLs) that the formatter leaves.
    lines_longer_than_80_chars: true

    # ── Readability ──
    prefer_const_constructors: true
    prefer_const_declarations: true
    prefer_single_quotes: true
    sort_child_properties_last: true
    use_build_context_synchronously: true
    avoid_unnecessary_containers: true
    sized_box_for_whitespace: true

    # ── Safety ──
    always_declare_return_types: true
    avoid_print: true
    avoid_relative_lib_imports: true
    prefer_is_empty: true
    prefer_is_not_empty: true

    # ── Flutter Best Practices ──
    prefer_const_literals_to_create_immutables: true
    use_key_in_widget_constructors: true
    avoid_function_literals_in_foreach_calls: true

# ─── Formatter ────────────────────────────────────────────────────────────────
formatter:
  page_width: 80
